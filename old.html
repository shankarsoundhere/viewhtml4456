<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>बकाया लिस्ट</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#28a745">

<style>
*{
  box-sizing:border-box;
}

html,body{
  width:100%;
  max-width:100%;
  overflow-x:hidden;
  scroll-behavior:smooth;
}

body{
  font-family:Arial,sans-serif;
  background:#dcdde1;
  padding:10px;
  margin:0;
}

/* 🔥 NEW TOP LIST (design same theme) */
.topList{
  background:#f1f2f6;
  padding:10px;
  margin:12px 0;
  border-radius:15px;
  box-shadow:0 4px 8px rgba(0,0,0,0.1);
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.topList a{
  padding:6px 10px;
  background:linear-gradient(45deg,#28a745,#34d058);
  color:white;
  border-radius:20px;
  text-decoration:none;
  font-size:12px;
  font-weight:bold;
  white-space:nowrap;
}

/* ===== ORIGINAL CSS SAME ===== */

.box{
  background:#f1f2f6;
  padding:14px;
  margin:12px 0;
  border-radius:15px;
  box-shadow:0 4px 8px rgba(0,0,0,0.1);
  width:100%;
  max-width:100%;
  overflow:hidden;
}

.bottom{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
  width:100%;
}

.nameBox{
  flex:1;
  min-width:0;
  font-size:15px;
  font-weight:bold;
  line-height:1.3;
  word-break:break-word;
  overflow-wrap:anywhere;
}

.number{
  display:none;
  margin-top:3px;
  font-size:13px;
  color:blue;
  line-height:1.3;
  font-weight:normal;
  word-break:break-word;
  overflow-wrap:anywhere;
}

.toggle{
  font-size:12px;
  color:blue;
  cursor:pointer;
  margin-left:5px;
}

.callBox{
  display:flex;
  gap:5px;
  flex-wrap:wrap;
  justify-content:flex-end;
  flex-shrink:0;
  max-width:95px;
}

.btn{
  padding:7px 12px;
  background:linear-gradient(45deg,#28a745,#34d058);
  color:white;
  border-radius:25px;
  text-decoration:none;
  font-size:12px;
  font-weight:bold;
  white-space:nowrap;
}

.detail{
  margin-top:10px;
  font-size:13px;
  width:100%;
  max-width:100%;
  overflow:hidden;
}

.metaRow{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin:8px 0;
  font-size:14px;
  font-weight:bold;
  min-width:0;
  width:100%;
}

.metaRow span{
  word-break:break-word;
  overflow-wrap:anywhere;
  max-width:100%;
}

.noteItem{
  display:flex;
  align-items:flex-start;
  margin:8px 0;
  width:100%;
  max-width:100%;
  min-width:0;
}

.bullet{
  margin-right:8px;
  font-size:18px;
  line-height:1.2;
  flex-shrink:0;
}

.noteText{
  white-space:pre-wrap;
  font-size:14px;
  line-height:1.5;
  word-break:break-word;
  overflow-wrap:anywhere;
  min-width:0;
  max-width:100%;
}

.innerGrid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(80px,1fr));
  gap:8px 10px;
  width:100%;
  max-width:100%;
  min-width:0;
}

.innerGrid span{
  font-size:14px;
  line-height:1.5;
  white-space:normal;
  word-break:break-word;
  overflow-wrap:anywhere;
  min-width:0;
  max-width:100%;
}

@media(max-width:480px){
  body{
    padding:8px;
  }

  .box{
    padding:12px;
  }

  .bottom{
    gap:8px;
  }

  .callBox{
    max-width:80px;
  }

  .btn{
    padding:6px 9px;
    font-size:11px;
  }

  .innerGrid{
    grid-template-columns:repeat(2,minmax(0,1fr));
  }
}
</style>
</head>

<body>

<!-- 🔥 NAME LIST -->
<div id="topList" class="topList"></div>

<div id="list"></div>

<script type="module">
import { db } from "./firebase.js";

import {
  collection,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const colRef = collection(db,"tdm");

function cleanPhone(phone){
  return String(phone || "").replace(/\s+/g,"").trim();
}

function escapeHTML(text){
  return String(text || "")
  .replace(/&/g,"&amp;")
  .replace(/</g,"&lt;")
  .replace(/>/g,"&gt;")
  .replace(/"/g,"&quot;")
  .replace(/'/g,"&#039;");
}

function noteToHTML(note){
  let lines = String(note || "")
  .split("\n")
  .map(t=>t.trim())
  .filter(t=>t);

  if(lines.length <= 1){
    return `
    <div class="noteItem">
      <span class="bullet">•</span>
      <span class="noteText">${escapeHTML(note || "")}</span>
    </div>`;
  }

  return `
  <div class="noteItem">
    <span class="bullet">•</span>
    <div class="innerGrid">
      ${lines.map(t=>`<span>${escapeHTML(t)}</span>`).join("")}
    </div>
  </div>`;
}

onSnapshot(colRef,(snap)=>{

  let arr=[];

  snap.forEach(d=>{
    arr.push(d.data());
  });

  arr.sort((a,b)=>(a.time || 0) - (b.time || 0));

  let html="";
  let topHTML="";

  arr.forEach((x,i)=>{

    let id = "card"+i;

    /* 🔥 TOP LIST */
    topHTML += `<a href="#${id}">${escapeHTML(x.name || "-")}</a>`;

    let phone1 = x.phone1 || x.phone || "";
    let phone2 = x.phone2 || "";

    let phone1Call = cleanPhone(phone1);
    let phone2Call = cleanPhone(phone2);

    let callButtons = "";

    if(phone1Call){
      callButtons += `<a href="tel:${phone1Call}" class="btn">📞 Call</a>`;
    }

    if(phone2Call){
      callButtons += `<a href="tel:${phone2Call}" class="btn">📞 Call</a>`;
    }

    let dues = Array.isArray(x.dues) ? x.dues : [];

    if(!dues.length && Array.isArray(x.notes)){
      dues = x.notes.map(n=>({date:"",place:"",note:n}));
    }

    let detailHTML = "-";

    if(dues.length){
      detailHTML = dues.map(d=>{
        let meta = "";

        if(d.date || d.place){
          meta = `
          <div class="noteItem">
            <span class="bullet">•</span>
            <div class="metaRow">
              <span>${escapeHTML(d.date || "")}</span>
              <span>${escapeHTML(d.place || "")}</span>
            </div>
          </div>`;
        }

        return `
          ${meta}
          ${noteToHTML(d.note || "")}
        `;
      }).join("");
    }else if(x.amount){
      detailHTML = noteToHTML(x.amount);
    }

    let showBtn = phone1Call || phone2Call
    ? `<span class="toggle" onclick="toggleNumber(${i})">Show</span>`
    : "";

    html+=`
    <div class="box" id="${id}">

      <div class="bottom">

        <div class="nameBox">
          👤 ${escapeHTML(x.name || "-")}
          ${showBtn}

          <span class="number" id="num${i}">
            ${phone1 ? "📞 " + escapeHTML(phone1) : ""}
            ${phone2 ? `<br>📞 ${escapeHTML(phone2)}` : ""}
          </span>
        </div>

        <div class="callBox">
          ${callButtons}
        </div>

      </div>

      <div class="detail">${detailHTML}</div>

    </div>
    `;
  });

  document.getElementById("list").innerHTML=html;
  document.getElementById("topList").innerHTML=topHTML;

});

window.toggleNumber = function(i){
  let el = document.getElementById("num"+i);
  el.style.display = el.style.display === "block" ? "none" : "block";
}
</script>

<script src="pwa.js"></script>

</body>
</html>
