<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>राकेश मिस्त्री</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6200ea">

<style>
body { font-family: Arial; margin:10px; }

h3{
text-align:center;
}

table {
border-collapse: collapse;
width:100%;
margin-bottom:15px;
}

td {
border:1px solid black;
padding:6px;
font-size:14px;
}

td:nth-child(1){
text-align:center;
}

td:nth-child(2),
td:nth-child(3){
text-align:left;
padding-left:10px;
}

.noteBox{
border:1px solid black;
padding:10px;
min-height:120px;
}

ul{
margin:0;
padding-left:20px;
}

.back{
display:block;
text-align:center;
margin-top:10px;
text-decoration:none;
}
</style>
</head>

<body>

<h3>राकेश मिस्त्री</h3>

<table id="mainTable"></table>

<div class="noteBox">
<ul id="noteList"></ul>
</div>

<a href="light.html" class="back">⬅ वापस जाए</a>

<script type="module">

import {
db,
collection,
onSnapshot
} from "./firebase.js";

/* 🔥 SLOT 1 COLLECTION */
const params = new URLSearchParams(window.location.search);
const slot = params.get("slot") || "1";
const names = {
  "1": "राकेश मिस्त्री",
  "2": "चन्दन मिस्त्री",
  "3": "नुनु",
  "4": "विकाश ड्राइवर",
  "5": "बब्लू ड्राइवर",
  "6": "Slot 6",
  "7": "Slot 7",
  "8": "Slot 8",
  "9": "Slot 9",
  "10": "Slot 10"
};

document.title = names[slot] || "लाइट मिस्त्री";
document.querySelector("h3").innerText = names[slot] || "लाइट मिस्त्री";

const colRef = collection(db, "light_slot_" + slot);

onSnapshot(colRef,(snap)=>{

let mainHTML = "";
let notes = [];

snap.forEach(doc=>{
let d = doc.data();

/* MAIN TABLE */
if(
(d.date && d.date !== "-") ||
(d.work && d.work.trim() !== "") ||
(d.place && d.place.trim() !== "")
){
mainHTML += `
<tr>
<td>${d.date || ""}</td>
<td>${d.work || ""}</td>
<td>${d.place || ""}</td>
</tr>
`;
}

/* NOTES */
if((d.note || "").trim() !== ""){
notes.push(d.note);
}

});

/* SHOW DATA */
document.getElementById("mainTable").innerHTML = mainHTML;

/* NOTES LIST */
let noteHTML = "";
notes.forEach(n=>{
noteHTML += `<li>${n}</li>`;
});

document.getElementById("noteList").innerHTML = noteHTML;

});

</script>

<script src="pwa.js"></script>

</body>
</html>
