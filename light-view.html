<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>लाइट मिस्त्री</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6200ea">

<style>
body{
  font-family: Arial, sans-serif;
  margin:0;
  padding:15px;
  background:#fff;
  color:#000;
}

h3{
  text-align:center;
  margin:0 0 15px 0;
  font-size:22px;
}

/* Main Table */
table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
  margin-bottom:18px;
  border:2px solid #000;
}

td{
  border:2px solid #000;
  padding:14px 18px;
  font-size:28px;
  line-height:1.25;
  vertical-align:middle;
  word-break:break-word;
}

td:nth-child(1){
  width:30%;
  text-align:center;
}

td:nth-child(2){
  width:27%;
  text-align:left;
}

td:nth-child(3){
  width:43%;
  text-align:left;
}

/* Notes */
.noteBox{
  border:2px solid #000;
  padding:18px 22px;
  margin-top:12px;
  display:none;
}

ul{
  margin:0;
  padding-left:28px;
}

li{
  font-size:27px;
  line-height:1.45;
  margin-bottom:10px;
}

.back{
  display:block;
  text-align:center;
  margin-top:15px;
  text-decoration:none;
  font-size:16px;
}

@media(max-width:600px){
  body{
    padding:8px;
  }

  td{
    font-size:18px;
    padding:9px 10px;
  }

  li{
    font-size:18px;
  }

  .noteBox{
    padding:12px 14px;
  }
}
</style>
</head>

<body>

<h3>लाइट मिस्त्री</h3>

<table id="mainTable"></table>

<div class="noteBox" id="noteBox">
  <ul id="noteList"></ul>
</div>

<a href="light.html" class="back">⬅ वापस जाए</a>

<script type="module">

import {
  db,
  collection,
  onSnapshot
} from "./firebase.js";

const params = new URLSearchParams(window.location.search);
const slot = params.get("slot") || "1";

const names = {
  "1": "राकेश मिस्त्री",
  "2": "चन्दन मिस्त्री",
  "3": "नुनु",
  "4": "विकाश ड्राइवर",
  "5": "बब्लू ड्राइवर",
  "6": "Slot 6",
  "7": "Slot 7",
  "8": "Slot 8",
  "9": "Slot 9",
  "10": "Slot 10"
};

document.title = names[slot] || "लाइट मिस्त्री";
document.querySelector("h3").innerText = names[slot] || "लाइट मिस्त्री";

const colRef = collection(db, "light_slot_" + slot);

onSnapshot(colRef, (snap) => {

  let rows = [];
  let notes = [];

  snap.forEach(doc => {
    let d = doc.data();

    if(
      (d.date && d.date !== "-") ||
      (d.work && d.work.trim() !== "") ||
      (d.place && d.place.trim() !== "")
    ){
      rows.push({
        date: d.date || "",
        work: d.work || "",
        place: d.place || "",
        time: d.time || 0
      });
    }

    if((d.note || "").trim() !== ""){
      notes.push({
        note: d.note,
        time: d.time || 0
      });
    }
  });

  rows.sort((a,b) => a.time - b.time);
  notes.sort((a,b) => a.time - b.time);

  let mainHTML = "";
  rows.forEach(d => {
    mainHTML += `
      <tr>
        <td>${d.date}</td>
        <td>${d.work}</td>
        <td>${d.place}</td>
      </tr>
    `;
  });

  document.getElementById("mainTable").innerHTML = mainHTML;

  let noteHTML = "";
  notes.forEach(n => {
    noteHTML += `<li>${n.note}</li>`;
  });

  document.getElementById("noteList").innerHTML = noteHTML;

  if(noteHTML.trim() !== ""){
    document.getElementById("noteBox").style.display = "block";
  }else{
    document.getElementById("noteBox").style.display = "none";
  }

});

</script>

<script src="pwa.js"></script>

</body>
</html>
