<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>झारकिला लेबर</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#28a745">

<style>

/* 🔥 BODY FIX (CENTER + NO ZOOM ISSUE) */
body{
font-family:Arial;
background:#dcdde1;
margin:0;
padding:15px;
display:flex;
justify-content:center;
align-items:flex-start;
box-sizing:border-box;
overflow-x:hidden;
}

/* 📄 PAGE */
.page{
width:210mm;
max-width:100%;
min-height:297mm;
background:white;
padding:12mm;
box-sizing:border-box;
box-shadow:0 0 10px rgba(0,0,0,0.25);
}

/* TITLE */
h3{
text-align:center;
margin-bottom:10px;
}

/* TABLE */
table{
border-collapse:collapse;
width:100%;
table-layout:fixed;
font-size:13px;
}

td{
border:1px solid black;
padding:6px 3px;
text-align:center;
word-break:break-word;
}

.head td{
font-weight:bold;
background:#eee;
}

/* DATE FIX */
#mainTable td:nth-child(1){
width:85px;
white-space:nowrap;
font-size:12px;
}

/* NOTE */
.noteBox{
border:1px solid black;
padding:8px;
min-height:60px;
margin-top:10px;
}

ul{
margin:0;
padding-left:18px;
text-align:left;
}

/* BACK BUTTON */
.back{
text-align:center;
margin-top:10px;
}

/* 📱 MOBILE FIX */
@media(max-width:800px){

body{
display:block;
padding:8px;
}

.page{
width:100%;
max-width:100%;
min-height:auto;
padding:10px;
margin:0 auto;
box-shadow:none;
}

table{
font-size:11px;
}

td{
padding:5px 2px;
}

}

/* 🖨️ PRINT */
@media print{

@page{
size:A4;
margin:8mm;
}

body{
background:white;
padding:0;
display:block;
}

.page{
width:100%;
min-height:auto;
padding:0;
box-shadow:none;
}

/* hide back */
.back{
display:none;
}

/* header repeat */
thead{
display:table-header-group;
}

tr{
page-break-inside:avoid;
}

}
</style>
</head>

<body>

<div class="page">

<h3>👷 झारकिला लेबर</h3>

<table id="mainTable">

<tr class="head">
<td>तारीख</td>
<td>नाम 1</td>
<td>नाम 2</td>
<td>नाम 3</td>
<td>नाम 4</td>
<td>नाम 5</td>
<td>नाम 6</td>
</tr>

</table>

<h4>Note</h4>

<div class="noteBox">
<ul id="noteList"></ul>
</div>

<div class="back">
<a href="index.html">⬅ वापस जाए</a>
</div>

</div>

<script type="module">

import {
db,
collection,
onSnapshot
} from "./firebase.js";

/* MAIN DATA */
onSnapshot(collection(db,"jharkila"),(snap)=>{

let html=`
<tr class="head">
<td>तारीख</td>
<td>नाम 1</td>
<td>नाम 2</td>
<td>नाम 3</td>
<td>नाम 4</td>
<td>नाम 5</td>
<td>नाम 6</td>
</tr>
`;

snap.forEach(d=>{
let x=d.data();

html+=`
<tr>
<td>${x.date || ""}</td>
<td>${x.n1 || ""}</td>
<td>${x.n2 || ""}</td>
<td>${x.n3 || ""}</td>
<td>${x.n4 || ""}</td>
<td>${x.n5 || ""}</td>
<td>${x.n6 || ""}</td>
</tr>
`;
});

document.getElementById("mainTable").innerHTML=html;

});

/* NOTE */
onSnapshot(collection(db,"jharkila_note"),(snap)=>{

let noteHTML="";

snap.forEach(d=>{
let n=d.data();
if(n.text){
noteHTML+=`<li>${n.text}</li>`;
}
});

document.getElementById("noteList").innerHTML=noteHTML;

});

</script>

<script src="pwa.js"></script>

</body>
</html>
