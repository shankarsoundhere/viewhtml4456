<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>झारकिला लेबर</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#28a745">

<style>
body{
font-family:Arial;
background:#dcdde1;
margin:0;
padding:15px;
display:flex;
justify-content:center;
align-items:flex-start;
box-sizing:border-box;
overflow-x:hidden;
}

.page{
width:210mm;
max-width:100%;
min-height:297mm;
background:white;
padding:12mm;
box-sizing:border-box;
box-shadow:0 0 10px rgba(0,0,0,0.25);
}

h3{
text-align:center;
margin-bottom:10px;
}

table{
border-collapse:collapse;
width:100%;
table-layout:fixed;
font-size:13px;
}

td{
border:1px solid black;
padding:6px 3px;
text-align:center;
word-break:break-word;
}

.head td{
font-weight:bold;
background:#eee;
}

#mainTable td:nth-child(1){
width:85px;
white-space:nowrap;
font-size:12px;
}

.noteBox{
border:1px solid black;
padding:8px;
min-height:60px;
margin-top:10px;
}

ul{
margin:0;
padding-left:18px;
text-align:left;
}

.back{
text-align:center;
margin-top:10px;
}

@media(max-width:800px){
body{
display:block;
padding:8px;
}

.page{
width:100%;
max-width:100%;
min-height:auto;
padding:10px;
margin:0 auto;
box-shadow:none;
}

table{
font-size:11px;
}

td{
padding:5px 2px;
}
}

@media print{
@page{
size:A4;
margin:8mm;
}

body{
background:white;
padding:0;
display:block;
}

.page{
width:100%;
min-height:auto;
padding:0;
box-shadow:none;
}

.back{
display:none;
}

thead{
display:table-header-group;
}

tr{
page-break-inside:avoid;
}
}
</style>
</head>

<body>

<div class="page">

<h3>👷 झारकिला लेबर</h3>

<table id="mainTable">
<tr class="head">
<td>तारीख</td>
<td>1</td>
<td>2</td>
<td>3</td>
<td>4</td>
<td>5</td>
<td>6</td>
</tr>
</table>

<h4>Note</h4>

<div class="noteBox">
<ul id="noteList"></ul>
</div>

<div class="back">
<a href="index.html">⬅ वापस जाए</a>
</div>

</div>

<script type="module">
import {
db,
collection,
onSnapshot
} from "./firebase.js";

function sortDate(d){
let p=(d || "").split("-");
if(p.length !== 3) return 0;

let dd=p[0].padStart(2,"0");
let mm=p[1].padStart(2,"0");
let yy=p[2];

if(yy.length === 2){
yy="20"+yy;
}

return Number(yy + mm + dd);
}

/* MAIN DATA - OLD TO NEW SORT */
onSnapshot(collection(db,"jharkila"),(snap)=>{

let arr=[];

snap.forEach(d=>{
let x=d.data();

arr.push({
date:x.date || "",
n1:x.n1 || "",
n2:x.n2 || "",
n3:x.n3 || "",
n4:x.n4 || "",
n5:x.n5 || "",
n6:x.n6 || ""
});
});

arr.sort((a,b)=>sortDate(a.date) - sortDate(b.date));

let html=`
<tr class="head">
<td>तारीख</td>
<td>नाम 1</td>
<td>नाम 2</td>
<td>नाम 3</td>
<td>नाम 4</td>
<td>नाम 5</td>
<td>नाम 6</td>
</tr>
`;

arr.forEach(x=>{
html+=`
<tr>
<td>${x.date}</td>
<td>${x.n1}</td>
<td>${x.n2}</td>
<td>${x.n3}</td>
<td>${x.n4}</td>
<td>${x.n5}</td>
<td>${x.n6}</td>
</tr>
`;
});

document.getElementById("mainTable").innerHTML=html;

});

/* NOTE */
onSnapshot(collection(db,"jharkila_note"),(snap)=>{

let noteHTML="";

snap.forEach(d=>{
let n=d.data();

if(n.text){
noteHTML+=`<li>${n.text}</li>`;
}
});

document.getElementById("noteList").innerHTML=noteHTML;

});
</script>

<script src="pwa.js"></script>

</body>
</html>
