<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>विकाश ड्राइवर</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6200ea">

<style>
body{font-family:Arial;margin:10px;}

h3{text-align:center;}

table{
border-collapse:collapse;
width:100%;
margin-bottom:15px;
}

td{
border:1px solid black;
padding:6px;
}

td:nth-child(1){
text-align:center;
}

td:nth-child(2),
td:nth-child(3){
text-align:left;
padding-left:10px;
}

.noteBox{
border:1px solid black;
padding:10px;
min-height:120px;
}

ul{
margin:0;
padding-left:20px;
}

.back{
display:block;
text-align:center;
margin-top:10px;
text-decoration:none;
}
</style>
</head>

<body>

<h3>विकाश ड्राइवर</h3>

<table id="mainTable"></table>

<div class="noteBox">
<ul id="noteList"></ul>
</div>

<a href="light.html" class="back">⬅ वापस जाए</a>

<script type="module">

import {
db,
collection,
onSnapshot
} from "./firebase.js";

/* 🔥 SLOT 3 */
const params = new URLSearchParams(window.location.search);
const slot = params.get("slot") || "6";

const colRef = collection(db, "light_slot_" + slot);


onSnapshot(colRef,(snap)=>{

let mainHTML="";
let notes=[];

snap.forEach(doc=>{
let d=doc.data();

/* MAIN TABLE */
if(
(d.date && d.date !== "-") ||
(d.work && d.work.trim() !== "") ||
(d.place && d.place.trim() !== "")
){
mainHTML += `
<tr>
<td>${d.date || ""}</td>
<td>${d.work || ""}</td>
<td>${d.place || ""}</td>
</tr>
`;
}

/* NOTES */
if((d.note || "").trim() !== ""){
notes.push({
note:d.note,
time:d.time || 0
});
}

});

/* SORT NOTE (OLD → NEW) */
notes.sort((a,b)=>a.time-b.time);

/* SHOW TABLE */
document.getElementById("mainTable").innerHTML = mainHTML;

/* SHOW NOTES */
let noteHTML="";
notes.forEach(n=>{
noteHTML += `<li>${n.note}</li>`;
});

document.getElementById("noteList").innerHTML = noteHTML;

});

</script>

<script src="pwa.js"></script>

</body>
</html>
