<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shankar Tent House</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="favicon.png">
<link rel="apple-touch-icon" href="icon-192.png">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="firebase.js"></script>

<style>
body {
    font-family: Arial;
    margin: 0;
    padding: 10px;
}

.container {
    max-width: 1400px;
    margin: auto;
}

/* LED */
.led-board {
    overflow: hidden;
    white-space: nowrap;
    background: black;
    padding: 15px 0;
    margin-bottom: 20px;
    border-radius: 10px;
}

.led-text {
    display: inline-block;
    font-size: 36px;
    font-weight: bold;
    animation: scrollText 12s linear infinite;
}

@keyframes scrollText {
    0% { transform: translateX(100%); }
    100% { transform: translateX(-100%); }
}

.saffron { color: orange; }
.white { color: white; }
.green { color: #00ff00; }

/* Table */
.table-container {
    overflow-x: auto;
}

table {
    width: max-content;
    min-width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 6px 10px;
    border: 1px solid #ddd;
    font-size: 13px;
    white-space: nowrap;
}

th {
    background: #4facfe;
    color: white;
    font-size: 18px;
}

td:nth-child(1) { text-align: center; }
td:nth-child(2), td:nth-child(3) { text-align: left; }

tr:hover {
    background: #ddd;
    cursor: pointer;
}

/* Mobile */
@media(max-width:600px){
    .led-text { font-size: 18px; }
    th, td { font-size: 11px; }
    th { font-size: 14px; }
}
</style>
</head>

<body>

<div class="container">

<div class="led-board">
    <div class="led-text">
        <span class="saffron">शंकर टेंट हाउस</span> 
        <span class="white">लखीसराय</span> 
        <span class="green">7004814456 , 6200164687</span>
    </div>
</div>

<div class="table-container">
<table>

<thead>
<tr>
    <th>दिनांक</th>
    <th>काम</th>
    <th>कहां जाएगा</th>
</tr>
</thead>

<tbody id="dataBody">
<!-- खाली रहेगा -->
</tbody>

</table>
</div>

</div>

<script>
const dataBody = document.getElementById("dataBody");
const PATH = "mainList";

function escapeHTML(text){
    return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
}

function dateNum(d){
    if(!d) return 0;
    let [dd,mm,yy] = d.split("-");
    if(!dd || !mm || !yy) return 0;
    return Number(yy + mm.padStart(2,"0") + dd.padStart(2,"0"));
}

function openLink(link){
    if(link){
        window.open(link, "_blank");
    }
}

db.ref(PATH).on("value", snap => {

    dataBody.innerHTML = "";

    if(!snap.exists()){
        return; // कुछ नहीं दिखेगा
    }

    let arr = [];

    snap.forEach(c=>{
        arr.push(c.val());
    });

    // sort by date
    arr.sort((a,b)=> dateNum(a.date) - dateNum(b.date));

    arr.forEach(item=>{
        let tr = document.createElement("tr");

        tr.onclick = ()=> openLink(item.link);

        tr.innerHTML = `
        <td>${escapeHTML(item.date)}</td>
        <td>${escapeHTML(item.work)}</td>
        <td>${escapeHTML(item.place)}</td>
        `;

        dataBody.appendChild(tr);
    });

});
</script>

</body>
</html>
