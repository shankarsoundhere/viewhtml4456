<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shankar Tent House</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#28a745">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
body{
font-family:Arial;
margin:0;
padding:10px;
background:#f2f2f2;
}

/* HEADER */
.led-board{
background:black;
border-radius:20px;
padding:10px;
margin-bottom:15px;
overflow:hidden;
}

.led-text{
white-space:nowrap;
display:inline-block;
font-size:20px;
font-weight:bold;
animation:scroll 12s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(100%);}
100%{transform:translateX(-100%);}
}

.saffron{color:orange;}
.white{color:white;}
.green{color:#00ff00;}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:8px;
overflow:hidden;
}

th{
background:#4fa3e3;
color:white;
padding:10px;
font-size:14px;
text-align:left;
}

td{
padding:10px;
font-size:14px;
border-top:1px solid #ddd;
}

td:nth-child(1){
text-align:center;
width:30%;
}

td:nth-child(2){
width:35%;
}

td:nth-child(3){
width:35%;
}

tr:nth-child(even){
background:#f5f5f5;
}

tr:hover{
background:#e0e0e0;
cursor:pointer;
}

/* BACK */
.back{
display:block;
text-align:center;
margin-top:15px;
font-size:14px;
text-decoration:none;
}

/* MOBILE */
@media(max-width:600px){

.led-text{
font-size:16px;
}

th,td{
font-size:13px;
padding:8px;
}
}
</style>
</head>

<body>

<div class="led-board">
<div class="led-text">
<span class="saffron">शंकर टेंट हाउस</span>
<span class="white">लखीसराय</span>
<span class="green">7004814456 , 6200164687</span>
</div>
</div>

<table>
<thead>
<tr>
<th>दिनांक</th>
<th>काम</th>
<th>कहां जाएगा</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<a href="index.html" class="back">⬅ वापस जाए</a>

<script type="module">

import {
db,
collection,
onSnapshot
} from "./firebase.js";

const colRef = collection(db,"main_list");

function getSortDate(date){
let p=(date||"").split("-");
if(p.length!==3) return new Date(9999,11,31);
return new Date(p[2],p[1]-1,p[0]);
}

onSnapshot(colRef,(snap)=>{

let arr=[];

snap.forEach(d=>{
let x=d.data();

arr.push({
date:x.date||"",
work:x.work||"",
place:x.place||"",
link:x.link||"",
sort:getSortDate(x.date)
});
});

arr.sort((a,b)=>a.sort-b.sort);

let html="";

arr.forEach(x=>{
html+=`
<tr onclick="openLink('${x.link||""}')">
<td>${x.date}</td>
<td>${x.work}</td>
<td>${x.place}</td>
</tr>
`;
});

document.getElementById("tbody").innerHTML=html;

});

window.openLink=function(link){
if(link){
window.open(link,"_blank");
}
}

</script>

<script src="pwa.js"></script>

</body>
</html>
