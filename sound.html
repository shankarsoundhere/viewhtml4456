<style>
body{
    font-family:Arial;
    padding:10px;
    background:white;
}
.container{
    max-width:1400px;
    margin:auto;
}
.led-board{
    background:black;
    padding:15px;
    border-radius:10px;
    overflow:hidden;
}
.led-text{
    color:white;
    font-size:28px;
    animation:scroll 10s linear infinite;
}
@keyframes scroll{
    0%{transform:translateX(100%)}
    100%{transform:translateX(-100%)}
}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}
th,td{
    border:1px solid #ddd;
    padding:8px;
    font-size:14px;
}
th{
    background:#4facfe;
    color:white;
}
tr:hover{
    background:#eee;
    cursor:pointer;
}
</style>

<body>

<div class="container">

<div class="led-board">
<div class="led-text">
शंकर टेंट हाउस | 7004814456
</div>
</div>

<table>
<thead>
<tr>
<th>दिनांक</th>
<th>काम</th>
<th>कहां जाएगा</th>
</tr>
</thead>

<tbody id="dataBody">
<tr><td colspan="3">Loading...</td></tr>
</tbody>

</table>

</div>

<script>

const dataBody = document.getElementById("dataBody");

// Admin panel same path use करे
const PATH = "mainList";

// date sorting function
function dateNum(d){
    if(!d) return 0;
    let [dd,mm,yy] = d.split("-");
    return Number(yy+mm+dd);
}

// load data
db.ref(PATH).on("value", snap => {

    dataBody.innerHTML = "";

    if(!snap.exists()){
        dataBody.innerHTML = "<tr><td colspan='3'>No Data</td></tr>";
        return;
    }

    let arr = [];

    snap.forEach(c=>{
        arr.push(c.val());
    });

    // sort by date
    arr.sort((a,b)=> dateNum(a.date) - dateNum(b.date));

    arr.forEach(item=>{
        let tr = document.createElement("tr");

        tr.onclick = ()=>{
            if(item.link){
                window.open(item.link,"_blank");
            }else{
                alert("Link नहीं है");
            }
        };

        tr.innerHTML = `
        <td>${item.date||""}</td>
        <td>${item.work||""}</td>
        <td>${item.place||""}</td>
        `;

        dataBody.appendChild(tr);
    });

});

</script>

</body>
