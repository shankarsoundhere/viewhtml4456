<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>पंडाल मिस्त्री</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#28a745">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
body{
font-family:Arial;
margin:10px;
background:#fff;
}

h3{
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
margin-bottom:15px;
}

td{
border:1px solid #000;
padding:10px;
vertical-align:top;
line-height:1.8;
font-size:16px;
text-align:left;
}

.title{
font-size:20px;
font-weight:bold;
margin:12px 0 5px;
}

ul{
margin:0;
padding-left:20px;
}

.back{
display:block;
text-align:center;
margin-top:15px;
text-decoration:none;
}
</style>
</head>

<body>

<h3>🎪 पंडाल मिस्त्री</h3>

<div id="table1Section" style="display:none;">
<div class="title">हाजरी</div>
<table>
<tr>
<td>
<ul id="table1Data"></ul>
</td>
</tr>
</table>
</div>

<div id="table2Section" style="display:none;">
<div class="title">📝 Notes</div>
<table>
<tr>
<td>
<ul id="table2Data"></ul>
</td>
</tr>
</table>
</div>

<a href="index.html" class="back">⬅ वापस जाए</a>

<script type="module">

import {
db,
collection,
onSnapshot
} from "./firebase.js";

onSnapshot(collection(db,"pandal"),snap=>{

let t1="";
let t2="";
let has1=false;
let has2=false;

snap.forEach(d=>{
let x=d.data();

if(x.note1 && x.note1.trim() !== ""){
has1=true;

x.note1.split("\n").forEach(line=>{
if(line.trim() !== ""){
t1 += `<li>${line.trim()}</li>`;
}
});
}

if(x.note2 && x.note2.trim() !== ""){
has2=true;

x.note2.split("\n").forEach(line=>{
if(line.trim() !== ""){
t2 += `<li>${line.trim()}</li>`;
}
});
}

});

document.getElementById("table1Data").innerHTML=t1;
document.getElementById("table2Data").innerHTML=t2;

document.getElementById("table1Section").style.display=has1 ? "block" : "none";
document.getElementById("table2Section").style.display=has2 ? "block" : "none";

});

</script>

<script src="pwa.js"></script>

</body>
</html>
