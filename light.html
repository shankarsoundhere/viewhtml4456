<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>लाइट मिस्त्री</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#f8f9fa;
}

/* Header */
.header {
    background:#0d6efd;
    color:white;
    text-align:center;
    padding:16px;
    font-size:18px;
    position:sticky;
    top:0;
    z-index:1000;
}

/* Container */
.container {
    padding:12px;
}

/* Card */
.card {
    display:block;
    text-decoration:none;
    color:#212529;
    background:white;
    margin-bottom:12px;
    padding:16px;
    border-radius:12px;
    box-shadow:0 3px 8px rgba(0,0,0,0.08);
    font-size:16px;
    font-weight:500;
    transition:0.2s;
}

/* Tap effect */
.card:active {
    transform:scale(0.98);
    background:#f1f3f6;
}

/* Back button */
.back {
    display:block;
    text-align:center;
    margin:15px;
    font-size:16px;
    text-decoration:none;
    color:#0d6efd;
}

/* Mobile spacing */
@media (max-width:600px){
    .card{
        font-size:17px;
        padding:18px;
    }
}
</style>
</head>

<body>

<div class="header">💡 लाइट मिस्त्री</div>

<div class="container">

<a class="card" href="light-view.html?slot=1">राकेश मिस्त्री</a>

<a class="card" href="light-view.html?slot=5">बब्लू ड्राइवर</a>
<a class="card" href="light-view.html?slot=6">Slot 6</a>
<a class="card" href="light-view.html?slot=7">Slot 7</a>
<a class="card" href="light-view.html?slot=8">Slot 8</a>
<a class="card" href="light-view.html?slot=9">Slot 9</a>
<a class="card" href="light-view.html?slot=10">Slot 10</a>

</div>

<a class="back" href="index.html">⬅ वापस जाए</a>

</body>
</html>
