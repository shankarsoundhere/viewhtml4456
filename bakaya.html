<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>बकाया लिस्ट</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#28a745">

<style>
body{
font-family:Arial;
background:#dcdde1;
padding:10px;
}

.box{
background:#f1f2f6;
padding:12px;
margin:12px 0;
border-radius:15px;
box-shadow:0 4px 8px rgba(0,0,0,0.1);
}

.top{
display:flex;
gap:10px;
font-size:14px;
font-weight:bold;
flex-wrap:wrap;
}

.top span{
background:#dfe4ea;
padding:3px 8px;
border-radius:8px;
}

.detail{
margin-top:6px;
font-size:13px;
word-break:break-word;
}

.bottom{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:8px;
gap:10px;
}

.nameBox{
font-size:14px;
}

.number{
display:none;
font-size:13px;
color:blue;
margin-top:2px;
line-height:1.5;
}

.toggle{
font-size:12px;
color:blue;
cursor:pointer;
margin-left:5px;
}

.callBox{
display:flex;
gap:5px;
flex-wrap:wrap;
justify-content:flex-end;
}

.btn{
padding:7px 12px;
background:linear-gradient(45deg,#28a745,#34d058);
color:white;
border-radius:25px;
text-decoration:none;
font-size:12px;
font-weight:bold;
}
</style>
</head>

<body>

<div id="list"></div>

<script type="module">

import {
db,
collection,
onSnapshot
} from "./firebase.js";

const colRef = collection(db,"bakaya");

function dateToNumber(dateStr){
if(!dateStr) return 99999999;
let p = dateStr.split("-");
if(p.length !== 3) return 99999999;
return Number(p[2] + p[1].padStart(2,"0") + p[0].padStart(2,"0"));
}

function cleanPhone(phone){
return String(phone || "").replace(/\s+/g,"").trim();
}

onSnapshot(colRef,(snap)=>{

let arr=[];

snap.forEach(d=>{
let x=d.data();
arr.push(x);
});

arr.sort((a,b)=>{
let d1 = dateToNumber(a.date);
let d2 = dateToNumber(b.date);

if(d1 === d2){
return (a.time || 0) - (b.time || 0);
}

return d1 - d2;
});

let html="";
let i=0;

arr.forEach(x=>{

let phone1 = x.phone1 || x.phone || "";
let phone2 = x.phone2 || "";

let phone1Call = cleanPhone(phone1);
let phone2Call = cleanPhone(phone2);

let callButtons = "";

if(phone1Call){
callButtons += `<a href="tel:${phone1Call}" class="btn">📞 Call</a>`;
}

if(phone2Call){
callButtons += `<a href="tel:${phone2Call}" class="btn">📞 Call</a>`;
}

html+=`
<div class="box">

<div class="top">
<span>${x.date||"-"}</span>
<span>${x.work||"-"}</span>
<span>${x.place||"-"}</span>
</div>

<div class="detail">${x.amount||"-"}</div>

<div class="bottom">

<div class="nameBox">
👤 ${x.name||"-"}
<span class="toggle" onclick="toggleNumber(${i})">Show</span><br>
<span class="number" id="num${i}">
📞 ${phone1 || "-"}
${phone2 ? `<br>📞 ${phone2}` : ""}
</span>
</div>

<div class="callBox">
${callButtons}
</div>

</div>

</div>
`;

i++;
});

document.getElementById("list").innerHTML=html;

});

window.toggleNumber = function(i){
let el = document.getElementById("num"+i);
el.style.display = (el.style.display==="block") ? "none" : "block";
}

</script>

<script src="pwa.js"></script>

</body>
</html>
